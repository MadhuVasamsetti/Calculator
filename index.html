<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Calculato</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

  <div class="calculator">

    <div class="top-section">
      <h2>Calculator</h2>
      <button id="themeToggle">🌙</button>
    </div>

    <input type="text" id="display" disabled>

    <div class="buttons">

      <button class="operator" onclick="clearDisplay()">AC</button>
      <button class="operator" onclick="deleteLast()">DEL</button>
      <button class="operator" onclick="appendValue('%')">%</button>
      <button class="operator" onclick="appendValue('/')">÷</button>

      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('*')">×</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button class="operator" onclick="appendValue('-')">−</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button class="operator" onclick="appendValue('+')">+</button>

      <button onclick="appendValue('0')">0</button>
      <button onclick="appendValue('.')">.</button>

      <button class="equal" onclick="calculate()">=</button>

    </div>

    <div class="scientific-buttons">

      <button onclick="appendValue('Math.sqrt(')">√</button>
      <button onclick="appendValue('Math.pow(')">x²</button>
      <button onclick="appendValue('Math.sin(')">sin</button>
      <button onclick="appendValue('Math.cos(')">cos</button>
      <button onclick="appendValue('Math.tan(')">tan</button>

    </div>

  </div>

  <div class="history">
    <h3>History</h3>
    <ul id="historyList"></ul>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
